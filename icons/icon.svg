<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#ff2d55"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- バーベルシャフト（横棒） -->
  <rect x="96" y="238" width="320" height="36" rx="18" fill="url(#accent)" filter="url(#glow)"/>

  <!-- 左プレート（大） -->
  <rect x="118" y="178" width="52" height="156" rx="14" fill="url(#accent)" opacity="0.95"/>
  <!-- 左プレート（小） -->
  <rect x="80" y="202" width="38" height="108" rx="10" fill="url(#accent)" opacity="0.75"/>

  <!-- 右プレート（大） -->
  <rect x="342" y="178" width="52" height="156" rx="14" fill="url(#accent)" opacity="0.95"/>
  <!-- 右プレート（小） -->
  <rect x="394" y="202" width="38" height="108" rx="10" fill="url(#accent)" opacity="0.75"/>

  <!-- グリップ中央ハイライト -->
  <rect x="216" y="246" width="80" height="20" rx="10" fill="rgba(255,255,255,0.12)"/>
</svg>
