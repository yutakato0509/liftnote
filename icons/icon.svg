<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- 背景 -->
  <rect width="192" height="192" rx="40" fill="#0d0d0d"/>
  <!-- グラデーション定義 -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff2d55;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- バーベルアイコン -->
  <rect x="86" y="48" width="20" height="96" rx="4" fill="url(#grad)"/>
  <rect x="44" y="66" width="44" height="60" rx="6" fill="url(#grad)" opacity="0.85"/>
  <rect x="104" y="66" width="44" height="60" rx="6" fill="url(#grad)" opacity="0.85"/>
  <rect x="32" y="76" width="16" height="40" rx="4" fill="url(#grad)" opacity="0.7"/>
  <rect x="144" y="76" width="16" height="40" rx="4" fill="url(#grad)" opacity="0.7"/>
  <!-- L テキスト -->
  <text x="96" y="158" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="900" fill="url(#grad)" text-anchor="middle" letter-spacing="1">LiftNote</text>
</svg>
